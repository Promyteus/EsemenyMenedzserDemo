<div class="list-container">
  <div class="list-header">
    <h2>Events</h2>
    <button mat-raised-button color="primary" routerLink="/events/new">
      <mat-icon>add</mat-icon> Add new event
    </button>
  </div>

  <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8 full-width">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
      <td mat-cell *matCellDef="let event">{{ event.name }}</td>
    </ng-container>

    <ng-container matColumnDef="place">
      <th mat-header-cell *matHeaderCellDef>Place</th>
      <td mat-cell *matCellDef="let event">
        {{ event.location }} <span class="country-text">{{ event.country ?',' + event.country : '' }}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="capacity">
      <th mat-header-cell *matHeaderCellDef>Capacity</th>
      <td mat-cell *matCellDef="let event">{{ event.capacity ? event.capacity + ' ppl' : '' }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let event">
        <div class="action-buttons">
          <button class="btn-action btn-edit" (click)="editEvent(event.id)">
            <mat-icon>edit</mat-icon> Edit
          </button>
          <button class="btn-action btn-delete" (click)="deleteEvent(event.id)">
            <mat-icon>delete</mat-icon> Delete
          </button>
        </div>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
